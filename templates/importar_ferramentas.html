<!DOCTYPE html>
<html>
<head>
<title>Importar Ferramentas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4" style="max-width: 800px;">

    <div class="card p-4 shadow-sm">
        <h2 class="mb-4">Importar Ferramentas</h2>

        {% if mensagem %}
            <div class="alert alert-info">{{ mensagem }}</div>
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Selecione o arquivo Excel ou CSV</label>
                <input type="file" name="arquivo" class="form-control" accept=".xlsx,.csv" required>
            </div>

            <button type="submit" class="btn btn-success">Importar</button>
            <a href="/" class="btn btn-secondary">Voltar</a>
        </form>

        <hr>

        <h5>Formato obrigatório da planilha</h5>
        <table class="table table-bordered">
            <tr>
                <th>nome</th>
                <th>codigo</th>
            </tr>
            <tr>
                <td>Chave 13</td>
                <td>CH013</td>
            </tr>
            <tr>
                <td>Alicate Universal</td>
                <td>AL001</td>
            </tr>
        </table>

        {% if detalhes %}
            <hr>
            <h5>Detalhes da importação</h5>
            <ul class="list-group">
                {% for item in detalhes %}
                    <li class="list-group-item">{{ item }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>

</div>
</body>
</html>
