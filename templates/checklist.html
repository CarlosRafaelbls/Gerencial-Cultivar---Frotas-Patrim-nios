{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h3 class="mb-4">
        📋 Checklist - {{ tipo|capitalize }}
    </h3>

    <a href="/veiculos"
       class="btn btn-secondary mb-3">

       ⬅ Voltar
    </a>

    <form method="POST" enctype="multipart/form-data">

        <div class="card p-4 shadow-sm border-0 rounded-4">

            <!-- CONDUTOR -->

            <div class="mb-3">

                <label class="form-label fw-bold">
                    Condutor
                </label>

                <input type="text"
                       name="condutor"
                       class="form-control"
                       placeholder="Digite o nome do responsável"
                       required>

            </div>

            <!-- KM -->

            <div class="mb-3">

                <label class="form-label fw-bold">
                    KM Atual
                </label>

                <input type="number"
                       name="km"
                       class="form-control"
                       required>

            </div>

            <hr>

            <!-- ITENS -->

            <h5 class="mb-3">
                ✅ Itens de Verificação
            </h5>

            <div class="row">

                <div class="col-md-6">

                    <label>
                        <input type="checkbox" name="macaco">
                        Macaco hidráulico
                    </label>

                    <br>

                    <label>
                        <input type="checkbox" name="estepe">
                        Estepe
                    </label>

                    <br>

                    <label>
                        <input type="checkbox" name="chave_roda">
                        Chave de roda
                    </label>

                    <br>

                    <label>
                        <input type="checkbox" name="farois">
                        Faróis
                    </label>

                </div>

                <div class="col-md-6">

                    <label>
                        <input type="checkbox" name="oleo">
                        Nível de óleo
                    </label>

                    <br>

                    <label>
                        <input type="checkbox" name="agua">
                        Água do radiador
                    </label>

                    <br>

                    <label>
                        <input type="checkbox" name="documentos">
                        Documentos
                    </label>

                    <br>

                    <label>
                        <input type="checkbox" name="pneus">
                        Condição dos pneus
                    </label>

                </div>

            </div>

            <hr>

            <!-- OBSERVAÇÕES -->

            <div class="mb-3">

                <label class="form-label fw-bold">
                    Observações
                </label>

                <textarea name="observacoes"
                          class="form-control"
                          rows="4"></textarea>

            </div>

            <hr>

            <!-- FOTO -->

            <h5 class="mb-3">
                📸 Fotos do veículo
            </h5>

            <input type="file"
                   name="foto"
                   class="form-control mb-4">

            <!-- ASSINATURA -->

            <h5 class="mb-3">
                ✍️ Assinatura do Responsável
            </h5>

            <canvas id="assinatura"
                    style="
                    border:2px solid #d1d5db;
                    border-radius:15px;
                    width:100%;
                    height:200px;
                    background:white;
                    "></canvas>

            <input type="hidden"
                   name="assinatura_base64"
                   id="assinatura_base64">

            <button type="button"
                    onclick="limparAssinatura()"
                    class="btn btn-warning mt-3">

                Limpar assinatura

            </button>

            <!-- BOTÃO -->

            <button class="btn btn-success w-100 mt-4 py-3">

                💾 Salvar Checklist

            </button>

        </div>

    </form>

</div>

<!-- SCRIPT ASSINATURA -->

<script>

let canvas = document.getElementById("assinatura");
let ctx = canvas.getContext("2d");

function ajustarCanvas() {

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

}

ajustarCanvas();

let desenhando = false;

canvas.addEventListener("mousedown", () => {

    desenhando = true;

});

canvas.addEventListener("mouseup", () => {

    desenhando = false;
    ctx.beginPath();

});

canvas.addEventListener("mousemove", desenhar);

function desenhar(e) {

    if (!desenhando) return;

    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#111827";

    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();

    ctx.beginPath();

    ctx.moveTo(e.offsetX, e.offsetY);

}

function limparAssinatura() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

}

document.querySelector("form").addEventListener("submit", function(){

    document.getElementById("assinatura_base64").value =
        canvas.toDataURL("image/png");

});

</script>

{% endblock %}
