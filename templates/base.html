<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cultivar Frotas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:'Poppins',sans-serif;
            margin:0;
            padding:0;
        }

        /* =========================
           SIDEBAR
        ========================= */

        .sidebar{
            width:260px;
            height:100vh;
            position:fixed;
            top:0;
            left:0;
            background:#0f172a;
            padding:20px;
            overflow-y:auto;
        }

        .sidebar img{
            width:170px;
            margin-bottom:30px;
        }

        .sidebar a{
            color:#e5e7eb;
            text-decoration:none;
            display:block;
            padding:14px;
            border-radius:12px;
            margin-bottom:10px;
            transition:0.3s;
            font-weight:500;
        }

        .sidebar a:hover{
            background:#1e293b;
            color:white;
            transform:translateX(5px);
        }

        .sidebar i{
            margin-right:10px;
        }

        /* =========================
           CONTEÚDO
        ========================= */

        .content{
            margin-left:280px;
            padding:30px;
        }

        /* =========================
           TOPBAR
        ========================= */

        .topbar{
            background:white;
            padding:25px;
            border-radius:20px;
            margin-bottom:25px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .topbar h3{
            margin:0;
            font-weight:700;
            color:#111827;
        }

        /* =========================
           CARDS
        ========================= */

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .card-header{
            border-radius:20px 20px 0 0 !important;
            font-weight:600;
        }

        /* =========================
           TABELAS
        ========================= */

        .table{
            background:white;
            border-radius:20px;
            overflow:hidden;
        }

        .table thead{
            background:#111827;
            color:white;
        }

        .table tbody tr:hover{
            background:#f3f4f6;
        }

        .table td,
        .table th{
            vertical-align:middle;
        }

        /* =========================
           BOTÕES
        ========================= */

        .btn{
            border-radius:12px;
            font-weight:600;
        }

        .btn-sm{
            padding:6px 14px;
        }

        /* =========================
           BADGES
        ========================= */

        .badge{
            padding:8px 12px;
            border-radius:10px;
            font-size:13px;
        }

        /* =========================
           RESPONSIVO
        ========================= */

        @media(max-width:768px){

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
            }

            .content{
                margin-left:0;
                padding:15px;
            }

        }

    </style>

</head>

<body>

    <!-- =========================
         MENU LATERAL
    ========================== -->

    <div class="sidebar">

        <center>

            <img src="{{ url_for('static', filename='img/logo.png') }}">

        </center>

        <a href="/">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="/veiculos">
            <i class="bi bi-truck"></i>
            Veículos
        </a>

        <a href="/checklist">
            <i class="bi bi-clipboard-check"></i>
            Checklist
        </a>

        <a href="/relatorios">
            <i class="bi bi-bar-chart"></i>
            Relatórios
        </a>

        <a href="/ferramentas">
    <i class="bi bi-tools"></i>
    Ferramentas
</a>

        <a href="/tecnicos">
            <i class="bi bi-people"></i>
            Técnicos
        </a>

    </div>

    <!-- =========================
         CONTEÚDO
    ========================== -->

    <div class="content">

        <!-- TOPO -->

        <div class="topbar">

            <h3>
                🚜 Sistema Cultivar Frotas
            </h3>

        </div>

        <!-- PÁGINAS -->

        {% block content %}
        {% endblock %}

    </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
