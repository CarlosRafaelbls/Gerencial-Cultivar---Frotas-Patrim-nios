<!DOCTYPE html>
<html>
<head>
<title>Adicionar Item ao Kit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4" style="max-width: 700px;">

    <div class="card p-4 shadow-sm">
        <h2 class="mb-4">Adicionar Item ao Kit</h2>

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Ferramenta</label>
                <select name="ferramenta_id" class="form-select" required>
                    <option value="">-- Escolha uma ferramenta --</option>
                    {% for ferramenta in ferramentas %}
                    <option value="{{ ferramenta[0] }}">
                        {{ ferramenta[1] }} - {{ ferramenta[2] }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Quantidade</label>
                <input type="number" name="quantidade" class="form-control" min="1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Estado Inicial</label>
                <select name="estado_inicial" class="form-select" required>
                    <option value="Boa">Boa</option>
                    <option value="Usada">Usada</option>
                    <option value="Danificada">Danificada</option>
                    <option value="Incompleta">Incompleta</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Observação</label>
                <textarea name="observacao" class="form-control"></textarea>
            </div>

            <button type="submit" class="btn btn-success">Salvar</button>
            <a href="/kit/{{ kit_id }}" class="btn btn-secondary">Voltar</a>
        </form>
    </div>

</div>
</body>
</html>
