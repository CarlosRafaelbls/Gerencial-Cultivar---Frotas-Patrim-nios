<!DOCTYPE html>
<html>
<head>
<title>Histórico de Uso</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

    <h2 class="mb-4">Histórico de Uso das Ferramentas</h2>

    <a href="/" class="btn btn-secondary mb-3">Voltar</a>

    <table class="table table-bordered table-striped align-middle">
        <tr>
            <th>ID</th>
            <th>Ferramenta</th>
            <th>Técnico</th>
            <th>Data Retirada</th>
            <th>Data Devolução</th>
            <th>Assinatura</th>
        </tr>

        {% for item in historico %}
        <tr>
            <td>{{ item[0] }}</td>
            <td>{{ item[1] }}</td>
            <td>{{ item[2] }}</td>
            <td>{{ item[3] }}</td>
            <td>{{ item[4] }}</td>
            <td>
                {% if item[5] %}
                    <img src="{{ url_for('static', filename='assinaturas/' + item[5]) }}" width="150">
                {% else %}
                    Sem assinatura
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </table>

</div>
</body>
</html>
