<!DOCTYPE html>
<html>
<head>
<title>Editar Item do Kit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4" style="max-width: 700px;">

    <div class="card p-4 shadow-sm">
        <h2 class="mb-4">Editar Item do Kit</h2>

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Ferramenta</label>
                <select name="ferramenta_id" class="form-select" required>
                    {% for ferramenta in ferramentas %}
                    <option value="{{ ferramenta[0] }}" {% if ferramenta[0] == item[2] %}selected{% endif %}>
                        {{ ferramenta[1] }} - {{ ferramenta[2] }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Quantidade</label>
                <input type="number" name="quantidade" value="{{ item[3] }}" class="form-control" min="1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Estado Inicial</label>
                <select name="estado_inicial" class="form-select" required>
                    <option value="Boa" {% if item[4] == 'Boa' %}selected{% endif %}>Boa</option>
                    <option value="Usada" {% if item[4] == 'Usada' %}selected{% endif %}>Usada</option>
                    <option value="Danificada" {% if item[4] == 'Danificada' %}selected{% endif %}>Danificada</option>
                    <option value="Incompleta" {% if item[4] == 'Incompleta' %}selected{% endif %}>Incompleta</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Observação</label>
                <textarea name="observacao" class="form-control">{{ item[5] }}</textarea>
            </div>

            <button type="submit" class="btn btn-success">Salvar</button>
            <a href="/kits" class="btn btn-secondary">Voltar</a>
        </form>
    </div>

</div>
</body>
</html>
