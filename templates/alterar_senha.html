<!DOCTYPE html>
<html>
<head>
<title>Alterar Senha</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4" style="max-width: 450px;">

    <div class="card p-4 shadow-sm">
        <h3 class="mb-3 text-center">Alterar Senha</h3>

        {% if mensagem %}
            <div class="alert alert-info">{{ mensagem }}</div>
        {% endif %}

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Senha atual</label>
                <input type="password" name="senha_atual" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Nova senha</label>
                <input type="password" name="nova_senha" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-warning w-100">Alterar Senha</button>
        </form>

        <br>
        <a href="/" class="btn btn-secondary w-100">Voltar</a>
    </div>

</div>
</body>
</html>
