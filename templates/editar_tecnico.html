<!DOCTYPE html>
<html>
<head>
<title>Editar Técnico</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">

    <h2 class="mb-4">Editar Técnico</h2>

    <div class="card p-4 shadow-sm">
        <p><strong>ID:</strong> {{ tecnico[0] }}</p>

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" value="{{ tecnico[1] }}" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">Salvar</button>
            <a href="/tecnicos" class="btn btn-secondary">Voltar</a>
        </form>
    </div>

</div>
</body>
</html>
