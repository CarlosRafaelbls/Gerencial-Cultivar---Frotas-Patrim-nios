    <!DOCTYPE html>
<html>
<head>
<title>Novo Kit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4" style="max-width: 600px;">

    <div class="card p-4 shadow-sm">
        <h2 class="mb-4">Criar Novo Kit</h2>

        <form method="post">
            <div class="mb-3">
                <label class="form-label">Nome do Kit</label>
                <input type="text" name="nome_kit" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Técnico</label>
                <select name="tecnico_id" class="form-select" required>
                    <option value="">-- Escolha um técnico --</option>
                    {% for tecnico in tecnicos %}
                    <option value="{{ tecnico[0] }}">{{ tecnico[1] }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-success">Salvar</button>
            <a href="/kits" class="btn btn-secondary">Voltar</a>
        </form>
    </div>

</div>
</body>
</html>
