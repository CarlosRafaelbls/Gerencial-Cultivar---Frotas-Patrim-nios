<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Cultivar Máquinas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #11192c,
                #14532d
            );

            overflow:hidden;
        }

        /* EFEITO FUNDO */

        body::before{
            content:"";

            position:absolute;

            width:500px;
            height:500px;

            background:#16a34a;

            border-radius:50%;

            top:-150px;
            right:-150px;

            opacity:0.2;

            filter:blur(100px);
        }

        body::after{
            content:"";

            position:absolute;

            width:400px;
            height:400px;

            background:#04702c;

            border-radius:50%;

            bottom:-120px;
            left:-120px;

            opacity:0.15;

            filter:blur(100px);
        }

        /* CARD LOGIN */

        .login-card{

            width:420px;

            padding:40px;

            border-radius:25px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(12px);

            border:1px solid rgba(255,255,255,0.1);

            box-shadow:
            0 8px 30px rgba(0,0,0,0.3);

            position:relative;

            z-index:10;

            color:white;
        }

        .logo{
            width:120px;
            margin-bottom:20px;
        }

        .titulo{
            font-size:34px;
            font-weight:700;
            margin-bottom:5px;
        }

        .subtitulo{
            color:#cbd5e1;
            margin-bottom:30px;
            font-size:15px;
        }

        /* INPUTS */

        .form-control{

            background:rgba(255,255,255,0.08);

            border:none;

            border-radius:14px;

            padding:14px;

            color:white;

            margin-bottom:20px;
        }

        .form-control:focus{

            background:rgba(255,255,255,0.12);

            box-shadow:none;

            border:1px solid #22c55e;

            color:white;
        }

        .form-control::placeholder{
            color:#cbd5e1;
        }

        /* BOTÃO */

        .btn-login{

            width:100%;

            padding:14px;

            border:none;

            border-radius:14px;

            background:linear-gradient(
                135deg,
                #16a34a,
                #22c55e
            );

            color:white;

            font-weight:600;

            font-size:16px;

            transition:0.3s;
        }

        .btn-login:hover{

            transform:translateY(-2px);

            box-shadow:
            0 10px 20px rgba(34,197,94,0.3);
        }

        .rodape{
            text-align:center;
            margin-top:20px;
            font-size:13px;
            color:#cbd5e1;
        }

    </style>

</head>

<body>

    <div class="login-card text-center">

        <!-- LOGO -->
        <img
            src="{{ url_for('static', filename='img/logo.png') }}"
            class="logo"
        >

        <div class="titulo">
            Gerencial Cultivar Máquinas
        </div>

        <div class="subtitulo">
            Sistema de Gestão de Frota e Ferramentas
        </div>

        <!-- FORM -->

        <form method="POST">

            <input
                type="text"
                name="usuario"
                class="form-control"
                placeholder="Usuário"
                required
            >

            <input
                type="password"
                name="senha"
                class="form-control"
                placeholder="Senha"
                required
            >

            <button type="submit" class="btn-login">
                Entrar no Sistema
            </button>

        </form>

        <div class="rodape">
            © 2026 Cultivar Máquinas
        </div>

    </div>

</body>
</html>
