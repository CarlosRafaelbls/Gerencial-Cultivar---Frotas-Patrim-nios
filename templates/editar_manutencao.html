{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            ✏️ Editar Manutenção
        </h2>

        <form method="POST">

            <div class="mb-3">

                <label>Descrição</label>

                <input type="text"
                       name="descricao"
                       class="form-control"
                       value="{{ manutencao[1] }}"
                       required>

            </div>

            <div class="mb-3">

                <label>Valor</label>

                <input type="number"
                       step="0.01"
                       name="valor"
                       class="form-control"
                       value="{{ manutencao[2] }}"
                       required>

            </div>

            <button class="btn btn-success">
                Salvar Alterações
            </button>

        </form>

    </div>

</div>

{% endblock %}
